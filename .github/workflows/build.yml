name: Build Jarvis EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller edge-tts playsound ollama

      - name: Build EXE
        run: |
          pyinstaller --onefile --name Jarvis_AI_Assistant main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis_AI_Assistant
          path: dist/Jarvis_AI_Assistant.exe